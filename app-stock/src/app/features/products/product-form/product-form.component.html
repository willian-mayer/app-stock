<div class="modal-overlay">
  <div class="modal">
    <h3>{{ isEdit ? 'Edit Product' : 'New Product' }}</h3>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label>Name *</label>
          <input formControlName="name" placeholder="Product name" />
        </div>
        <div class="form-group">
          <label>SKU *</label>
          <input formControlName="sku" placeholder="e.g. PROD-001" style="text-transform:uppercase" />
        </div>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea formControlName="description" placeholder="Optional description"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Category *</label>
          <select formControlName="category">
            <option value="">Select category</option>
            <option *ngFor="let cat of categories" [value]="cat._id">{{ cat.name }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Unit</label>
          <input formControlName="unit" placeholder="unit, kg, box..." />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Price ($) *</label>
          <input type="number" formControlName="price" placeholder="0.00" min="0" step="0.01" />
        </div>
        <div class="form-group">
          <label>Current Stock *</label>
          <input type="number" formControlName="stock" placeholder="0" min="0" />
        </div>
      </div>

      <div class="form-group">
        <label>Minimum Stock (alert threshold)</label>
        <input type="number" formControlName="minStock" placeholder="5" min="0" />
      </div>

      <div *ngIf="error" class="error-msg">{{ error }}</div>

      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" (click)="cancelled.emit()">Cancel</button>
        <button type="submit" class="btn btn-primary" [disabled]="loading || form.invalid">
          <span *ngIf="!loading">{{ isEdit ? 'Save Changes' : 'Create Product' }}</span>
          <span *ngIf="loading" class="spinner"></span>
        </button>
      </div>
    </form>
  </div>
</div>
