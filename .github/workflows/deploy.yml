name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Si es la primera vez, clonar el repo
            if [ ! -d "/home/ubuntu/app-stock-repo" ]; then
              git clone https://github.com/TU_USUARIO/TU_REPO.git /home/ubuntu/app-stock-repo
            fi

            # Ir al repo y actualizar
            cd /home/ubuntu/app-stock-repo
            git pull origin main

            # Escribir el .env de la API
            cat > app-stock-api/.env << EOF
            PORT=3000
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=7d
            NODE_ENV=production
            EOF

            # Levantar con Docker Compose
            docker compose down
            docker compose up --build -d

            # Limpiar imágenes viejas
            docker image prune -f